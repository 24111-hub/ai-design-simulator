<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 3D 기계 설계 교육 플랫폼</title>
    
    <style>
        body { margin: 0; font-family: 'Malgun Gothic', sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        header { background: #333; color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        .main-container { display: flex; flex: 1; height: calc(100vh - 60px); }
        .control-panel { width: 35%; padding: 20px; box-sizing: border-box; border-right: 1px solid #ccc; display: flex; flex-direction: column; gap: 15px; overflow-y: auto; }
        .viewer-panel { width: 65%; position: relative; background: #111; }
        input, button, textarea { padding: 10px; font-size: 16px; border-radius: 5px; border: 1px solid #ddd; }
        button { background: #007bff; color: white; border: none; cursor: pointer; font-weight: bold; }
        button:hover { background: #0056b3; }
        #ai-output { background: #f9f9f9; padding: 15px; border-left: 5px solid #007bff; min-height: 100px; white-space: pre-wrap; font-size: 14px; line-height: 1.5; }
        #canvas-container { width: 100%; height: 100%; }
    </style>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
</head>
<body>

    <header>
        <h2>⚙️ AI Machine Design Edu</h2>
        <div>
            <span id="user-status">로그인이 필요합니다.</span>
            <button id="btn-login" onclick="toggleLogin()">구글 로그인</button>
        </div>
    </header>

    <div class="main-container">
        <div class="control-panel">
            <h3>🤖 AI 설계 어시스턴트</h3>
            <p>설계하고 싶은 기계 부품을 입력하세요.</p>
            <textarea id="user-input" rows="3" placeholder="예: 지름이 크고 두께가 얇은 원기둥 모양의 모터 축 설계해줘"></textarea>
            <button id="btn-generate" onclick="askAI()" disabled>AI에게 설계 요청하기 (로그인 필요)</button>
            
            <hr style="width:100%;">
            
            <h4>📋 AI 설계 결과 안내</h4>
            <div id="ai-output">질문을 입력하면 AI 가이드가 이곳에 표시됩니다.</div>
            <button id="btn-tts" onclick="speakResult()" style="background:#28a745;">🔊 음성 가이드 듣기 (TTS)</button>
        </div>

        <div class="viewer-panel">
            <div id="canvas-container"></div>
        </div>
    </div>

    <script>
        // ==========================================
        // [설정] 본인의 Firebase 및 Apps Script 주소 입력
        // ==========================================
        const firebaseConfig = {
            apiKey: "AIzaSyDzkv4MyzI1RF9KRPyerJywEtLv427T6DE",
            authDomain: "project-6180622403440470920.firebaseapp.com",
            databaseURL: "https://project-6180622403440470920-default-rtdb.firebaseio.com",
            projectId: "project-6180622403440470920",
            storageBucket: "project-6180622403440470920.firebasestorage.app",
            messagingSenderId: "626753939152",
            appId: "1:626753939152:web:485e286ff8e5b596bf20d5",
            measurementId: "G-QMSFMGJG0J"
        };
        firebase.initializeApp(firebaseConfig);
        
        const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzNxtI13fMnprrbHpqWAfGTV6fGKaJGGR_N28njaGkoDy39sZrp2aeE2n8wV8w34Ra0/exec";
        
        let currentAIExplanation = ""; // TTS용 텍스트 저장 변수

        // ==========================================
        // [기능 1] Firebase Auth (구글 로그인 시스템)
        // ==========================================
        const provider = new firebase.auth.GoogleAuthProvider();
        
        function toggleLogin() {
            const user = firebase.auth().currentUser;
            if (!user) {
                firebase.auth().signInWithPopup(provider);
            } else {
                firebase.auth().signOut();
            }
        }

        firebase.auth().onAuthStateChanged((user) => {
            const statusText = document.getElementById('user-status');
            const loginBtn = document.getElementById('btn-login');
            const generateBtn = document.getElementById('btn-generate');

            if (user) {
                statusText.innerText = `${user.displayName}님 환영합니다!`;
                loginBtn.innerText = "로그아웃";
                generateBtn.disabled = false;
                generateBtn.innerText = "AI에게 설계 요청하기";
            } else {
                statusText.innerText = "로그인이 필요합니다.";
                loginBtn.innerText = "구글 로그인";
                generateBtn.disabled = true;
                generateBtn.innerText = "AI에게 설계 요청하기 (로그인 필요)";
            }
        });

        // ==========================================
        // [기능 2] Three.js (3D 모델 시각화 기초 설정)
        // ==========================================
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a1a);

        // 카메라 및 렌더러 설정
        const camera = new THREE.PerspectiveCamera(60, container.clientWidth / container.clientHeight, 0.1, 1000);
        camera.position.set(0, 3, 5);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(container.clientWidth, container.clientHeight);
        container.appendChild(renderer.domElement);

        // 조명 추가
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(5, 10, 7);
        scene.add(dirLight);

        // 기본 기계 부품 (실린더 모델) 생성
        const geometry = new THREE.CylinderGeometry(1, 1, 2, 32);
        const material = new THREE.MeshStandardMaterial({ color: 0x90caf9, wireframe: false, roughness: 0.3 });
        const machinePart = new THREE.Mesh(geometry, material);
        scene.add(machinePart);

        // 애니메이션 루프
        function animate() {
            requestAnimationFrame(animate);
            machinePart.rotation.y += 0.01;
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        });

        // ==========================================
        // [기능 3] AI 연동 (에러 방지 샌드박스 적용)
        // ==========================================
        async function askAI() {
            const userInput = document.getElementById('user-input').value;
            if(!userInput) return alert("설계 요청을 입력하세요!");

            const outputDiv = document.getElementById('ai-output');
            outputDiv.innerText = "AI가 기계를 설계 중입니다. 잠시만 기다려주세요...";

            const systemPrompt = `${userInput} -> 이 요구사항에 맞는 기계 부품의 '반지름(radius)'과 '높이(height)'를 추천하고 공학적 해설을 작성해줘. 단, 답변은 반드시 아래의 JSON 포맷 하나만 출력해야 해. 앞뒤로 인사말이나 주석, 마크다운 기호(\`\`\`)를 절대로 넣지 마.
            { "radius": 반지름숫자(0.5에서 3사이), "height": 높이숫자(0.5에서 4사이), "description": "기계 설명 텍스트" }`;

            try {
                const response = await fetch(APPS_SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify({ prompt: systemPrompt })
                });
                
                let rawText = await response.text();
                console.log("🛠️ AI 원본 응답 데이터:", rawText);

                // 마크다운 문법(```json) 청소
                rawText = rawText.replace(/```json|```/gi, "").trim();
                
                // 실제 JSON 오브젝트 덩어리 { } 만 추출하기
                const firstOpenBrace = rawText.indexOf('{');
                const lastCloseBrace = rawText.lastIndexOf('}');
                
                if (firstOpenBrace === -1 || lastCloseBrace === -1) {
                    throw new Error("AI 응답에서 유효한 JSON 데이터를 발견하지 못했습니다.");
                }
                
                rawText = rawText.substring(firstOpenBrace, lastCloseBrace + 1);
                const aiData = JSON.parse(rawText);

                // 💡 핵심 에러 방어: 값이 누락되었을 때 undefined 에러로 튕기는 현상 원천 차단
                if (aiData.radius === undefined || aiData.height === undefined) {
                    console.warn("⚠️ AI 응답에 수치 데이터가 누락되어 기본값으로 대체합니다.");
                    aiData.radius = aiData.radius || 1;
                    aiData.height = aiData.height || 1;
                    aiData.description = aiData.description || "해당 부품 사양에 대한 분석 설명이 누락되었습니다.";
                }

                // 1. [3D 모델 변형 적용] 문자를 안전하게 숫자로 치환하여 적용
                machinePart.scale.set(Number(aiData.radius), Number(aiData.height), Number(aiData.radius));
                
                // 2. 전역 변수에 텍스트 바인딩 및 화면 노출
                currentAIExplanation = aiData.description;
                outputDiv.innerText = `📐 [추천 규격]\n- 반지름(Radius): ${aiData.radius}m\n- 높이(Height): ${aiData.height}m\n\n💡 [공학적 해설]\n${aiData.description}`;

                // 3. [TTS 실행] 변수가 완전히 채워진 후 안전하게 실행
                speakResult();

                // 4. [Firebase DB 저장]
                saveToFirestore(userInput, aiData);

            } catch (error) {
                console.error("❌ 상세 에러 로그:", error);
                outputDiv.innerText = `⚠️ 오류가 발생했습니다.\n\n[원인]\n${error.message}\n\n💡 F12를 눌러 콘솔 창의 'AI 원본 응답 데이터'가 어떤 형식으로 오고 있는지 확인이 필요합니다.`;
            }
        }

        // ==========================================
        // [기능 4] TTS 기능 (Web Speech API)
        // ==========================================
        function speakResult() {
            if (!currentAIExplanation) {
                return alert("읽을 내용이 없습니다. 먼저 AI 설계를 진행하세요.");
            }
            
            window.speechSynthesis.cancel(); // 겹침 방지를 위해 기존 음성 초기화
            const utterance = new SpeechSynthesisUtterance(currentAIExplanation);
            utterance.lang = 'ko-KR';
            utterance.rate = 1.0; 
            window.speechSynthesis.speak(utterance);
        }

        // ==========================================
        // [기능 5] Firebase Firestore 데이터 저장
        // ==========================================
        function saveToFirestore(prompt, aiData) {
            const user = firebase.auth().currentUser;
            if (user) {
                // Firebase가 거부하는 undefined 데이터 필터링 재확인
                firebase.firestore().collection("machinery_designs").add({
                    userId: user.uid,
                    userEmail: user.email,
                    userQuery: prompt,
                    designData: { 
                        radius: Number(aiData.radius), 
                        height: Number(aiData.height) 
                    },
                    explanation: aiData.description,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                })
                .then(() => console.log("💾 Firestore에 설계가 성공적으로 백업되었습니다."))
                .catch(err => console.error("❌ Firestore 저장 실패:", err));
            }
        }
    </script>
</body>
</html>
