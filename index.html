<!DOCTYPE html>
<html lang="ko">
<head>        
    <meta charset="UTF-8">        
    <meta name="viewport" content="width=device-width, initial-scale=1.0">        
    <title>AI 기반 2D 스마트 물류 기계 공정 시뮬레이터</title>            
    <style>                
        body { margin: 0; font-family: 'Malgun Gothic', sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; background: #1e1e1e; color: #fff; }                
        header { background: #141414; padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #007bff; }                
        .main-container { display: flex; flex: 1; height: calc(100vh - 60px); }                
        .control-panel { width: 35%; padding: 20px; box-sizing: border-box; border-right: 1px solid #333; display: flex; flex-direction: column; gap: 15px; overflow-y: auto; background: #252529; }                
        .viewer-panel { width: 65%; display: flex; justify-content: center; align-items: center; background: #111; position: relative; }                
        textarea, button { padding: 12px; font-size: 15px; border-radius: 6px; box-sizing: border-box; width: 100%; border: 1px solid #444; }                
        
        #user-input { min-height: 90px; background: #323236; color: #fff; resize: none; }        
        button { background: #007bff; color: white; border: none; cursor: pointer; font-weight: bold; }                
        button:hover { background: #0056b3; }                
        #ai-output { background: #323236; padding: 15px; border-left: 5px solid #007bff; border-radius: 4px; min-height: 140px; white-space: pre-wrap; font-size: 14px; line-height: 1.6; color: #ddd; }                
        #canvas-container { background: #16161a; border: 2px solid #333; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .viewer-hint { position: absolute; top: 15px; right: 15px; color: #007bff; font-size: 12px; font-weight: bold; }
    </style>        
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>        
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>        
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
</head>
<body>        
    <header>                
        <h2>🏭 AI Generative 2D Logistics Blueprint</h2>                
        <div>                        
            <span id="user-status" style="margin-right: 15px;">로그인이 필요합니다.</span>                        
            <button id="btn-login" onclick="toggleLogin()" style="width:auto; display:inline-block; padding:8px 15px; background:#444; color:#fff;">구글 로그인</button>                
        </div>        
    </header>        
    <div class="main-container">                
        <div class="control-panel">                        
            <h3>🤖 물류 시스템 자동화 가공기</h3>                        
            <p style="color:#aaa; font-size:13px; margin:0;">일상적인 대화체 문장으로 공장 설비 요구사항을 입력해 보세요.</p>                        
            <textarea id="user-input" placeholder="예: '긴 컨베이어 벨트 오른쪽에 분류용 로봇팔 2개랑 스캐너 하나 놔줘'"></textarea>                        
            <button id="btn-generate" onclick="askAI()">물류 라인 동적 배치 시작</button>                                    
            <hr style="width:100%; border: 0; border-top: 1px solid #333; margin:5px 0;">                                    
            <h4>📋 공정 역학 명세서</h4>                        
            <div id="ai-output">설계 명령을 내리면 기계 공학적 2D 플랜 도면이 렌더링됩니다.</div>                        
            <button id="btn-tts" onclick="speakResult()" style="background:#28a745; border:none; color:white;">🔊 설계 가이드 음성 듣기</button>                
        </div>                
        <div class="viewer-panel">                        
            <div class="viewer-hint">● LIVE RUNNING</div>                        
            <canvas id="canvas-container" width="600" height="400"></canvas>                
        </div>        
    </div>        
    <script>                
        const firebaseConfig = {            
            apiKey: "AIzaSyDzkv4MyzI1RF9KRPyerJywEtLv427T6DE",            
            authDomain: "project-6180622403440470920.firebaseapp.com",            
            databaseURL: "https://project-6180622403440470920-default-rtdb.firebaseio.com",            
            projectId: "project-6180622403440470920",            
            storageBucket: "project-6180622403440470920.firebasestorage.app",            
            messagingSenderId: "626753939152",            
            appId: "1:626753939152:web:485e286ff8e5b596bf20d5",            
            measurementId: "G-QMSFMGJG0J"        
        };                
        firebase.initializeApp(firebaseConfig);                                
        
        // ⚠️ 본인의 최신 구글 웹 앱 URL 주소를 넣어주세요.
        const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzWuwKB1AMH327f7GseeZbo2ao89ov_R2b5zPsClbTdVQSViRqzxOvHymC30yv68GMfMw/exec";                                
        
        let currentAIExplanation = "";                 
        let machineryList = []; 
        let animationFrameId;
        let globalOffset = 0; // 컨베이어 벨트 움직임 효과용 변수

        const canvas = document.getElementById('canvas-container');
        const ctx = canvas.getContext('2d');

        const provider = new firebase.auth.GoogleAuthProvider();                                
        function toggleLogin() {                        
            const user = firebase.auth().currentUser;                        
            if (!user) firebase.auth().signInWithPopup(provider).catch(e => console.log("인증 바인딩"));                        
            else firebase.auth().signOut();                        
        }                
        
        firebase.auth().onAuthStateChanged((user) => {                        
            const statusText = document.getElementById('user-status');                        
            const loginBtn = document.getElementById('btn-login');                        
            const generateBtn = document.getElementById('btn-generate');                        
            if (user) {                
                statusText.innerText = `👤 ${user.displayName}`; loginBtn.innerText = "로그아웃"; generateBtn.disabled = false;            
            } else {                
                statusText.innerText = "로그인이 필요합니다."; loginBtn.innerText = "구글 로그인"; generateBtn.disabled = true;            
            }        
        });                

        // 초기 기본 맵 구성
        machineryList = [
            { type: "conveyor", x: 50, y: 180, w: 350, h: 40, direction: "right", color: "#34495e" },
            { type: "scanner", x: 200, y: 175, w: 50, h: 50, color: "#9b59b6" },
            { type: "robot_arm", x: 480, y: 200, radius: 55, speed: 1.5, color: "#e67e22" }
        ];

        // ==========================================
        // 🛠️ 2D 고정밀 메카닉 캔버스 렌더링 루프
        // ==========================================
        function drawSimulation() {
            // 배경 및 도면 모눈종이(Grid) 그리기
            ctx.fillStyle = "#16161a";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.strokeStyle = "#232329";
            ctx.lineWidth = 1;
            for (let x = 0; x < canvas.width; x += 20) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke(); }
            for (let y = 0; y < canvas.height; y += 20) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke(); }

            globalOffset += 0.5; // 동적 기계 움직임 카운터

            machineryList.forEach(m => {
                ctx.save();
                
                // 1. 컨베이어 벨트 렌더링 (화살표 흐름 애니메이션 적용)
                if (m.type === "conveyor") {
                    ctx.fillStyle = m.color || "#34495e";
                    ctx.fillRect(m.x, m.y, m.w, m.h);
                    ctx.strokeStyle = "#7f8c8d";
                    ctx.lineWidth = 2;
                    ctx.strokeRect(m.x, m.y, m.w, m.h);
                    
                    // 기계적인 내부 벨트선 및 화살표 표현
                    ctx.strokeStyle = "rgba(255,255,255,0.2)";
                    ctx.setLineDash([5, 5]);
                    ctx.lineDashOffset = m.direction === "right" ? -globalOffset : globalOffset;
                    ctx.beginPath();
                    ctx.moveTo(m.x, m.y + m.h/2);
                    ctx.lineTo(m.x + m.w, m.y + m.h/2);
                    ctx.stroke();
                } 
                // 2. 로봇 팔 / 크레인 렌더링 (회전 반경 가동 범위 시각화)
                else if (m.type === "robot_arm") {
                    const currentAngle = (globalOffset * (m.speed || 1) * Math.PI) / 180;
                    
                    // 가동 한계 반경 점선 (정역학 범위)
                    ctx.strokeStyle = "rgba(230, 126, 34, 0.25)";
                    ctx.setLineDash([4, 4]);
                    ctx.beginPath();
                    ctx.arc(m.x, m.y, m.radius || 50, 0, Math.PI * 2);
                    ctx.stroke();
                    
                    // 로봇 관절 중심 축
                    ctx.fillStyle = m.color || "#e67e22";
                    ctx.beginPath(); ctx.arc(m.x, m.y, 12, 0, Math.PI * 2); ctx.fill();
                    
                    // 동역학적 물리 링크 Arm 회전선
                    ctx.strokeStyle = "#fff";
                    ctx.lineWidth = 4;
                    ctx.lineCap = "round";
                    ctx.setLineDash([]);
                    ctx.beginPath();
                    ctx.moveTo(m.x, m.y);
                    ctx.lineTo(m.x + Math.cos(currentAngle) * (m.radius || 50), m.y + Math.sin(currentAngle) * (m.radius || 50));
                    ctx.stroke();
                } 
                // 3. 센서 스캐너 / 검수 모듈 렌더링
                else if (m.type === "scanner") {
                    ctx.fillStyle = "rgba(155, 89, 182, 0.2)";
                    ctx.fillRect(m.x, m.y, m.w, m.h);
                    ctx.strokeStyle = m.color || "#9b59b6";
                    ctx.lineWidth = 2;
                    ctx.strokeRect(m.x, m.y, m.w, m.h);
                    
                    // 레이저 센서 가시광선 가공
                    ctx.strokeStyle = "rgba(231, 76, 60, 0.7)";
                    ctx.lineWidth = 1;
                    ctx.beginPath();
                    ctx.moveTo(m.x + m.w/2, m.y);
                    ctx.lineTo(m.x + m.w/2, m.y + m.h);
                    ctx.stroke();
                }
                // 4. 일반 보관 보틀 / 저장 구역
                else {
                    ctx.strokeStyle = "#2ecc71";
                    ctx.setLineDash([2, 2]);
                    ctx.strokeRect(m.x, m.y, m.w || 40, m.h || 40);
                    ctx.fillStyle = "rgba(46, 204, 113, 0.1)";
                    ctx.fillRect(m.x, m.y, m.w || 40, m.h || 40);
                }
                
                ctx.restore();
            });

            animationFrameId = requestAnimationFrame(drawSimulation);
        }
        drawSimulation();

        // AI 통신 분석기
        async function askAI() {                        
            const inputEl = document.getElementById('user-input');                        
            const userInput = inputEl.value;                        
            if(!userInput) return alert("배치할 일상적인 물류 공장 구조를 설명해 주세요!");                                    
            
            const outputDiv = document.getElementById('ai-output');                        
            outputDiv.innerText = "ChatGPT가 물류 라인 기계 좌표 설계도 연산 중...";                                    
            
            try {                                
                const response = await fetch(APPS_SCRIPT_URL, {                                        
                    method: 'POST',                    
                    body: JSON.stringify({ prompt: userInput })                                
                });                                                                
                
                let rawText = await response.text();                                
                rawText = rawText.replace(/```json|```/gi, "").trim();                                
                
                const firstOpen = rawText.indexOf('{');                                
                const lastClose = rawText.lastIndexOf('}');                                
                if(firstOpen === -1 || lastClose === -1) throw new Error("JSON 파싱 에러");
                rawText = rawText.substring(firstOpen, lastClose + 1);                                                                
                
                const aiData = JSON.parse(rawText);                                                
                const title = aiData.title || "지능형 물류 공정";
                currentAIExplanation = aiData.description || "설계도가 반영되었습니다.";                                                
                
                // ⚙️ 2D 좌표 리스트 교체 트리거
                machineryList = aiData.facilities || [];
                
                outputDiv.innerText = `🛠️ [AI 공정 배치도 사양]\n- 라인 분류: ${title}\n\n📖 [기계 역학 설명]\n${currentAIExplanation}`;                                                
                speakResult();                                
            } catch (error) {                                
                console.error(error);                                
                outputDiv.innerText = `⚠️ 데이터를 파싱하지 못했습니다. 스크립트의 API Key나 배포 상태를 다시 한번 확인해 주세요.`;                        
            }                
        }                

        function speakResult() {                        
            if (!currentAIExplanation) return;                                    
            window.speechSynthesis.cancel();                         
            const utterance = new SpeechSynthesisUtterance(currentAIExplanation);                        
            utterance.lang = 'ko-KR';                        
            window.speechSynthesis.speak(utterance);                
        }                
    </script>
</body>
</html>
