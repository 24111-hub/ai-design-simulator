<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 기계 설계 시뮬레이터</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f4f6f8;
padding:30px;
}

.container{
max-width:800px;
margin:auto;
background:white;
padding:20px;
border-radius:15px;
}

input{
width:100%;
padding:10px;
margin:10px 0;
}

button{
padding:10px 15px;
cursor:pointer;
}

#mainPage{
display:none;
}
</style>
</head>
<body>

<div class="container">

<h1>AI 기계 설계 시뮬레이터</h1>

<div id="loginPage">

<h3>회원가입</h3>

<input id="signupEmail" placeholder="이메일">
<input id="signupPassword" type="password" placeholder="비밀번호">

<button onclick="signUp()">
회원가입
</button>

<hr>

<h3>로그인</h3>

<input id="loginEmail" placeholder="이메일">
<input id="loginPassword" type="password" placeholder="비밀번호">

<button onclick="login()">
로그인
</button>

</div>

<div id="mainPage">

<h2 id="userInfo"></h2>

<button onclick="logout()">
로그아웃
</button>

<p>로그인 성공!</p>

</div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword,
signOut,
onAuthStateChanged
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
apiKey: "AIzaSyDzkv4MyzI1RF9KRPyerJywEtLv427T6DE",
authDomain: "project-6180622403440470920.firebaseapp.com",
databaseURL: "https://project-6180622403440470920-default-rtdb.firebaseio.com",
projectId: "project-6180622403440470920",
storageBucket: "project-6180622403440470920.firebasestorage.app",
messagingSenderId: "626753939152",
appId: "1:626753939152:web:485e286ff8e5b596bf20d5"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.signUp = async () => {

try{

await createUserWithEmailAndPassword(
auth,
document.getElementById("signupEmail").value,
document.getElementById("signupPassword").value
);

alert("회원가입 성공");

}catch(error){

alert(error.message);

}

};

window.login = async () => {

try{

await signInWithEmailAndPassword(
auth,
document.getElementById("loginEmail").value,
document.getElementById("loginPassword").value
);

}catch(error){

alert(error.message);

}

};

window.logout = async () => {

await signOut(auth);

};

onAuthStateChanged(auth,(user)=>{

if(user){

document.getElementById("loginPage").style.display="none";
document.getElementById("mainPage").style.display="block";
document.getElementById("userInfo").innerText=user.email;

}else{

document.getElementById("loginPage").style.display="block";
document.getElementById("mainPage").style.display="none";

}

});

</script>

</body>
</html>
